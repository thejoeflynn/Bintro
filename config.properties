# Bintro Configuration
# -------------------------------------------------------
# Copy this file to config.properties and fill in your values.
# config.properties is gitignored and should NEVER be committed.
# -------------------------------------------------------

# Anthropic Claude API key
# Get yours at: https://console.anthropic.com/
claude.api.key=YOUR_CLAUDE_API_KEY_HERE

# Claude model to use for scene matching
claude.model=claude-haiku-4-5-20251001

# Path to whisper.cpp binary (can be absolute or relative to project root)
whisper.binary.path=whisper/whisper

# Path to whisper model file
whisper.model.path=whisper/models/ggml-base.en.bin
